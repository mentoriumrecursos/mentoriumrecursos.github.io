<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Márgenes Reales — Mentorium</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#08080a;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
  .container{max-width:460px;margin:0 auto;padding:24px 16px 60px}

  .header{text-align:center;padding:30px 0 20px}
  .logo{width:40px;height:40px;background:#C45830;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;margin-bottom:14px}
  .header h1{font-size:22px;font-weight:900;letter-spacing:-0.5px;margin-bottom:6px}
  .header p{font-size:13px;color:#555;line-height:1.5}

  .card{background:#111113;border:1px solid #1c1c20;border-radius:16px;padding:24px;margin-bottom:16px}
  .card-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C45830;margin-bottom:18px}

  .field{margin-bottom:14px}
  .field label{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:#777;margin-bottom:6px}
  .field label .val{color:#C45830;font-weight:800;font-size:14px}
  .row{display:flex;align-items:center;gap:10px}
  .row input[type=range]{flex:1;-webkit-appearance:none;height:6px;background:#1c1c20;border-radius:100px;outline:none}
  .row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#C45830;border-radius:50%;cursor:pointer;border:3px solid #08080a}
  .row .num-input{width:90px;background:#0c0c0e;border:1px solid #1c1c20;border-radius:8px;color:#fff;font-size:15px;font-weight:700;padding:10px 12px;text-align:right;font-family:inherit;outline:none}
  .row .num-input:focus{border-color:#C45830}
  .row .unit{color:#555;font-size:13px;font-weight:600;width:20px}

  .breakdown{margin-top:10px}
  .bar-container{height:32px;background:#1c1c20;border-radius:8px;overflow:hidden;display:flex;margin-bottom:12px}
  .bar-segment{height:100%;transition:width 0.4s ease;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:rgba(255,255,255,0.9);overflow:hidden;white-space:nowrap}
  .legend{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#888}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .legend-item .amt{margin-left:auto;font-weight:700;color:#ccc;font-size:12px}

  .result-box{text-align:center;padding:30px 20px;border-radius:16px;margin-top:16px;transition:all 0.3s}
  .result-box.positive{background:linear-gradient(135deg,#0a1a0f,#0c0c0e);border:2px solid #1a3a25}
  .result-box.negative{background:linear-gradient(135deg,#1a0a08,#0c0c0e);border:2px solid #3a1a15}
  .result-box.neutral{background:#111113;border:2px solid #1c1c20}
  .result-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#888;margin-bottom:8px}
  .result-amount{font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1}
  .result-amount.pos{color:#2D8C4E}
  .result-amount.neg{color:#C45830}
  .result-pct{font-size:15px;color:#666;margin-top:8px;font-weight:600}
  .result-verdict{margin-top:16px;font-size:13px;font-weight:700;padding:10px 20px;border-radius:8px;display:inline-block}
  .v-danger{background:rgba(196,88,48,0.15);color:#C45830}
  .v-warning{background:rgba(200,170,40,0.12);color:#C8AA28}
  .v-good{background:rgba(45,140,78,0.15);color:#2D8C4E}

  .details{margin-top:10px}
  .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #141416;font-size:13px}
  .detail-row .lab{color:#666;font-weight:500}
  .detail-row .val{font-weight:700}
  .detail-row .val.neg{color:#C45830}
  .detail-row .val.pos{color:#2D8C4E}

  .insight-box{background:#0d0d00;border:1px solid #2a2200;border-radius:12px;padding:16px;margin-top:16px;font-size:13px;color:#a89840;line-height:1.6}
  .insight-box strong{color:#fff}

  .footer{text-align:center;padding:30px 0 10px;border-top:1px solid #141416;margin-top:24px}
  .footer .brand{font-size:12px;font-weight:800;color:#C45830;letter-spacing:3px}
  .footer .handle{font-size:13px;color:#444;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">M</div>
    <h1>Calculadora de Márgenes Reales</h1>
    <p>Mete tus números. Descubre que te queda de verdad.</p>
  </div>

  <div class="card">
    <div class="card-title">Facturación</div>
    <div class="field">
      <label>Facturación mensual <span class="val" id="lbl_rev">20.000</span></label>
      <div class="row">
        <input type="range" min="1000" max="200000" step="500" value="20000" id="sl_rev" oninput="sync('rev')">
        <input type="number" class="num-input" id="in_rev" value="20000" oninput="sync('rev',true)">
        <span class="unit">E</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Costes variables</div>
    <div class="field">
      <label>Coste producto + envio proveedor <span class="val" id="lbl_cogs">28%</span></label>
      <div class="row">
        <input type="range" min="5" max="60" step="1" value="28" id="sl_cogs" oninput="sync('cogs')">
        <input type="number" class="num-input" id="in_cogs" value="28" oninput="sync('cogs',true)">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="field">
      <label>Envio al cliente <span class="val" id="lbl_ship">10%</span></label>
      <div class="row">
        <input type="range" min="0" max="20" step="1" value="10" id="sl_ship" oninput="sync('ship')">
        <input type="number" class="num-input" id="in_ship" value="10" oninput="sync('ship',true)">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="field">
      <label>Gasto en ads mensual <span class="val" id="lbl_ads">4.000</span></label>
      <div class="row">
        <input type="range" min="0" max="50000" step="100" value="4000" id="sl_ads" oninput="sync('ads')">
        <input type="number" class="num-input" id="in_ads" value="4000" oninput="sync('ads',true)">
        <span class="unit">E</span>
      </div>
    </div>
    <div class="field">
      <label>Devoluciones <span class="val" id="lbl_ret">5%</span></label>
      <div class="row">
        <input type="range" min="0" max="15" step="1" value="5" id="sl_ret" oninput="sync('ret')">
        <input type="number" class="num-input" id="in_ret" value="5" oninput="sync('ret',true)">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="field">
      <label>Comisiones (Shopify + pasarela) <span class="val" id="lbl_fees">2.5%</span></label>
      <div class="row">
        <input type="range" min="0" max="8" step="0.5" value="2.5" id="sl_fees" oninput="sync('fees')">
        <input type="number" class="num-input" id="in_fees" value="2.5" step="0.1" oninput="sync('fees',true)">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="field">
      <label>Gastos fijos mensuales <span class="val" id="lbl_fixed">400</span></label>
      <div class="row">
        <input type="range" min="0" max="5000" step="50" value="400" id="sl_fixed" oninput="sync('fixed')">
        <input type="number" class="num-input" id="in_fixed" value="400" oninput="sync('fixed',true)">
        <span class="unit">E</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Desglose visual</div>
    <div class="breakdown">
      <div class="bar-container" id="bar"></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <div class="result-box neutral" id="resultBox">
    <div class="result-label">Lo que te queda de verdad</div>
    <div class="result-amount pos" id="resultAmt">---</div>
    <div class="result-pct" id="resultPct"></div>
    <div class="result-verdict" id="resultVerdict"></div>
  </div>

  <div class="card" id="detailsCard">
    <div class="card-title">Detalle completo</div>
    <div class="details" id="details"></div>
    <div class="insight-box" id="insight"></div>
  </div>

  <div class="footer">
    <div class="brand">MENTORIUM</div>
    <div class="handle">@javier.sanchezecom</div>
  </div>
</div>

<script>
const colors={cogs:'#8B4513',ship:'#D2691E',ads:'#C45830',ret:'#B22222',fees:'#8B0000',fixed:'#4A0404',profit:'#2D8C4E'};
const labels={cogs:'Producto',ship:'Envio',ads:'Publicidad',ret:'Devoluciones',fees:'Comisiones',fixed:'Fijos',profit:'Tu margen'};
function fmt(n){return Math.round(n).toLocaleString('es-ES')+'E'}
function sync(key,fromInput){
  var sl=document.getElementById('sl_'+key),inp=document.getElementById('in_'+key);
  if(fromInput){sl.value=inp.value}else{inp.value=sl.value}
  calc();
}
function calc(){
  var rev=parseFloat(document.getElementById('in_rev').value)||0;
  var cogs_p=parseFloat(document.getElementById('in_cogs').value)||0;
  var ship_p=parseFloat(document.getElementById('in_ship').value)||0;
  var ads=parseFloat(document.getElementById('in_ads').value)||0;
  var ret_p=parseFloat(document.getElementById('in_ret').value)||0;
  var fees_p=parseFloat(document.getElementById('in_fees').value)||0;
  var fixed=parseFloat(document.getElementById('in_fixed').value)||0;
  document.getElementById('lbl_rev').textContent=fmt(rev).replace('E','');
  document.getElementById('lbl_cogs').textContent=cogs_p+'%';
  document.getElementById('lbl_ship').textContent=ship_p+'%';
  document.getElementById('lbl_ads').textContent=fmt(ads).replace('E','');
  document.getElementById('lbl_ret').textContent=ret_p+'%';
  document.getElementById('lbl_fees').textContent=fees_p+'%';
  document.getElementById('lbl_fixed').textContent=fmt(fixed).replace('E','');
  var cogs=rev*cogs_p/100,ship=rev*ship_p/100,ret=rev*ret_p/100,fees=rev*fees_p/100;
  var net=rev-cogs-ship-ads-ret-fees-fixed;
  var pct=rev>0?(net/rev*100):0;
  var parts=[{key:'cogs',val:cogs},{key:'ship',val:ship},{key:'ads',val:ads},{key:'ret',val:ret},{key:'fees',val:fees},{key:'fixed',val:fixed},{key:'profit',val:Math.max(net,0)}];
  var total=parts.reduce(function(a,p){return a+Math.max(p.val,0)},0)||1;
  var barHTML='',legHTML='';
  parts.forEach(function(p){
    var w=Math.max(p.val,0)/total*100;
    if(w>0.5){barHTML+='<div class="bar-segment" style="width:'+w+'%;background:'+colors[p.key]+'">'+(w>8?Math.round(p.val/rev*100)+'%':'')+'</div>'}
    legHTML+='<div class="legend-item"><div class="legend-dot" style="background:'+colors[p.key]+'"></div>'+labels[p.key]+'<span class="amt">'+fmt(p.val)+'</span></div>';
  });
  document.getElementById('bar').innerHTML=barHTML;
  document.getElementById('legend').innerHTML=legHTML;
  var box=document.getElementById('resultBox'),amt=document.getElementById('resultAmt'),pctEl=document.getElementById('resultPct'),verd=document.getElementById('resultVerdict');
  amt.textContent=fmt(net);pctEl.textContent=pct.toFixed(1)+'% de margen neto';
  if(net<0){box.className='result-box negative';amt.className='result-amount neg';verd.className='result-verdict v-danger';verd.textContent='PIERDES DINERO'}
  else if(pct<10){box.className='result-box negative';amt.className='result-amount neg';verd.className='result-verdict v-danger';verd.textContent='ZONA DE PELIGRO'}
  else if(pct<20){box.className='result-box neutral';amt.className='result-amount pos';verd.className='result-verdict v-warning';verd.textContent='MEJORABLE'}
  else{box.className='result-box positive';amt.className='result-amount pos';verd.className='result-verdict v-good';verd.textContent='LISTO PARA ESCALAR'}
  var dHTML='';
  dHTML+='<div class="detail-row"><span class="lab">Facturación</span><span class="val">'+fmt(rev)+'</span></div>';
  dHTML+='<div class="detail-row"><span class="lab">Producto ('+cogs_p+'%)</span><span class="val neg">-'+fmt(cogs)+'</span></div>';
  dHTML+='<div class="detail-row"><span class="lab">Envio ('+ship_p+'%)</span><span class="val neg">-'+fmt(ship)+'</span></div>';
  dHTML+='<div class="detail-row"><span class="lab">Publicidad</span><span class="val neg">-'+fmt(ads)+'</span></div>';
  dHTML+='<div class="detail-row"><span class="lab">Devoluciones ('+ret_p+'%)</span><span class="val neg">-'+fmt(ret)+'</span></div>';
  dHTML+='<div class="detail-row"><span class="lab">Comisiones ('+fees_p+'%)</span><span class="val neg">-'+fmt(fees)+'</span></div>';
  dHTML+='<div class="detail-row"><span class="lab">Fijos</span><span class="val neg">-'+fmt(fixed)+'</span></div>';
  dHTML+='<div class="detail-row" style="border-top:2px solid #222;padding-top:14px"><span class="lab" style="font-weight:800;color:#fff">MARGEN NETO</span><span class="val '+(net>=0?'pos':'neg')+'" style="font-size:16px">'+fmt(net)+'</span></div>';
  document.getElementById('details').innerHTML=dHTML;
  var ins=document.getElementById('insight'),ads_pct=rev>0?(ads/rev*100):0;
  if(net<0){ins.innerHTML='<strong>Pierdes '+fmt(Math.abs(net))+' al mes.</strong> Cada venta te cuesta más de lo que ganas. Sube precio, baja ads, o mejora conversion.'}
  else if(pct<10){ins.innerHTML='<strong>Margen '+pct.toFixed(1)+'% — peligroso.</strong> Te quedan '+fmt(net)+'. '+(ads_pct>25?'Ads al '+ads_pct.toFixed(0)+'% es demasiado. Baja del 20%.':'Revisa coste producto y devoluciones.')}
  else if(pct<20){ins.innerHTML='<strong>Margen '+pct.toFixed(1)+'% — aceptable.</strong> '+fmt(net)+' limpios. '+(ads_pct>20?'Baja ads del '+ads_pct.toFixed(0)+'% al 17% mejorando creativos = '+fmt(rev*(ads_pct-17)/100)+' más.':'Activa email flows — recuperan 20-30% de carritos.')}
  else{ins.innerHTML='<strong>Margen '+pct.toFixed(1)+'% — solido.</strong> '+fmt(net)+' limpios. Si subes ads 20% y CPA se mantiene, facturas '+fmt(rev*1.15)+' con '+fmt(net*1.12)+' de margen.'}
}
calc();
</script>
</body>
</html>
