<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimizador de Precio y Oferta — Mentorium</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#08080a;color:#fff;min-height:100vh}
  .container{max-width:460px;margin:0 auto;padding:24px 16px 60px}
  .header{text-align:center;padding:30px 0 20px}
  .logo{width:40px;height:40px;background:#C45830;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;margin-bottom:14px}
  .header h1{font-size:22px;font-weight:900;margin-bottom:6px}
  .header p{font-size:13px;color:#555;line-height:1.5}
  .card{background:#111113;border:1px solid #1c1c20;border-radius:16px;padding:24px;margin-bottom:16px}
  .card-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C45830;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#777;margin-bottom:6px}
  .field label .val{color:#C45830;font-weight:800}
  .row{display:flex;align-items:center;gap:10px}
  .row input[type=range]{flex:1;-webkit-appearance:none;height:6px;background:#1c1c20;border-radius:100px;outline:none}
  .row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#C45830;border-radius:50%;cursor:pointer;border:3px solid #08080a}
  .row .num{width:80px;background:#0c0c0e;border:1px solid #1c1c20;border-radius:8px;color:#fff;font-size:15px;font-weight:700;padding:10px;text-align:right;font-family:inherit;outline:none}
  .row .num:focus{border-color:#C45830}
  .row .u{color:#555;font-size:13px;font-weight:600;width:16px}
  .strategies{margin-top:20px}
  .strat{background:#0c0c0e;border:1px solid #1c1c20;border-radius:12px;padding:18px;margin-bottom:12px;cursor:pointer;transition:all 0.2s}
  .strat:hover{border-color:#333}
  .strat.active{border-color:#C45830;background:rgba(196,88,48,0.05)}
  .strat h4{font-size:15px;font-weight:800;margin-bottom:6px}
  .strat.active h4{color:#C45830}
  .strat p{font-size:12px;color:#666;line-height:1.5}
  .result-box{text-align:center;padding:30px 20px;border-radius:16px;margin-top:16px;background:#111113;border:2px solid #1c1c20}
  .result-box .label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#888;margin-bottom:8px}
  .result-box .price{font-size:52px;font-weight:900;color:#2D8C4E;line-height:1}
  .result-box .sub{font-size:14px;color:#666;margin-top:8px}
  .compare{display:flex;gap:12px;margin-top:16px}
  .compare .col{flex:1;padding:16px;border-radius:10px;text-align:center}
  .compare .bad{background:rgba(196,88,48,0.05);border:1px solid rgba(196,88,48,0.15)}
  .compare .good{background:rgba(45,140,78,0.05);border:1px solid rgba(45,140,78,0.15)}
  .compare .col .num{font-size:24px;font-weight:900}
  .compare .bad .num{color:#C45830}
  .compare .good .num{color:#2D8C4E}
  .compare .col .desc{font-size:11px;color:#666;margin-top:4px}
  .bundles{margin-top:16px}
  .bundle{background:#0c0c0e;border:1px solid #1c1c20;border-radius:10px;padding:16px;margin-bottom:10px}
  .bundle h4{font-size:14px;font-weight:800;color:#C45830;margin-bottom:8px}
  .bundle p{font-size:13px;color:#888;line-height:1.5}
  .bundle .nums{font-size:13px;color:#2D8C4E;font-weight:700;margin-top:6px}
  .footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid #1a1a1a}
  .footer .brand{font-size:12px;font-weight:800;color:#C45830;letter-spacing:3px}
  .footer .handle{font-size:13px;color:#444;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">M</div>
    <h1>Optimizador de Precio y Oferta</h1>
    <p>Calcula tu precio optimo. Te sugiere bundles y upsells que suben el ticket medio.</p>
  </div>

  <div class="card">
    <div class="card-title">Tu producto</div>
    <div class="field">
      <label>Coste total del producto (producto + envio proveedor) <span class="val" id="lbl_cost">12</span></label>
      <div class="row"><input type="range" min="1" max="100" value="12" id="sl_cost" oninput="sync('cost')"><input type="number" class="num" id="in_cost" value="12" oninput="sync('cost',1)"><span class="u">E</span></div>
    </div>
    <div class="field">
      <label>Envio al cliente <span class="val" id="lbl_ship">4</span></label>
      <div class="row"><input type="range" min="0" max="15" value="4" id="sl_ship" oninput="sync('ship')"><input type="number" class="num" id="in_ship" value="4" oninput="sync('ship',1)"><span class="u">E</span></div>
    </div>
    <div class="field">
      <label>CPA estimado (coste por cliente via ads) <span class="val" id="lbl_cpa">15</span></label>
      <div class="row"><input type="range" min="1" max="60" value="15" id="sl_cpa" oninput="sync('cpa')"><input type="number" class="num" id="in_cpa" value="15" oninput="sync('cpa',1)"><span class="u">E</span></div>
    </div>
    <div class="field">
      <label>Margen neto objetivo <span class="val" id="lbl_margin">25%</span></label>
      <div class="row"><input type="range" min="10" max="50" value="25" id="sl_margin" oninput="sync('margin')"><input type="number" class="num" id="in_margin" value="25" oninput="sync('margin',1)"><span class="u">%</span></div>
    </div>
  </div>

  <div class="result-box" id="resBox">
    <div class="label">Precio mínimo recomendado</div>
    <div class="price" id="resPrice">--</div>
    <div class="sub" id="resSub"></div>
    <div class="compare" id="resCompare"></div>
  </div>

  <div class="card">
    <div class="card-title">Estrategias de precio</div>
    <div class="strategies" id="strats"></div>
  </div>

  <div class="card">
    <div class="card-title">Bundles que suben el ticket</div>
    <div class="bundles" id="bundles"></div>
  </div>

  <div class="footer">
    <div class="brand">MENTORIUM</div>
    <div class="handle">@javier.sanchezecom</div>
  </div>
</div>
<script>
function sync(k,fromInput){
  var sl=document.getElementById('sl_'+k),inp=document.getElementById('in_'+k);
  if(fromInput)sl.value=inp.value;else inp.value=sl.value;
  calc();
}
function calc(){
  var cost=parseFloat(document.getElementById('in_cost').value)||0;
  var ship=parseFloat(document.getElementById('in_ship').value)||0;
  var cpa=parseFloat(document.getElementById('in_cpa').value)||0;
  var margin_pct=parseFloat(document.getElementById('in_margin').value)||25;
  document.getElementById('lbl_cost').textContent=cost;
  document.getElementById('lbl_ship').textContent=ship;
  document.getElementById('lbl_cpa').textContent=cpa;
  document.getElementById('lbl_margin').textContent=margin_pct+'%';

  var total_cost=cost+ship+cpa;
  var min_price=Math.ceil(total_cost/(1-margin_pct/100));
  var sweet_spot=Math.ceil(min_price*1.15);

  document.getElementById('resPrice').textContent=min_price+'E';
  document.getElementById('resSub').textContent='Sweet spot: '+sweet_spot+'E (+15% margen de seguridad)';

  var profit_min=min_price-total_cost;
  var profit_sweet=sweet_spot-total_cost;
  document.getElementById('resCompare').innerHTML='<div class="col bad"><div class="num">'+profit_min+'E</div><div class="desc">Profit a '+min_price+'E</div></div><div class="col good"><div class="num">'+profit_sweet+'E</div><div class="desc">Profit a '+sweet_spot+'E</div></div>';

  // Strategies
  var s='';
  s+='<div class="strat"><h4>Precio redondo: '+sweet_spot+'E</h4><p>Sin decimales. Transmite simplicidad. Funciona en tickets medios (30-80E).</p></div>';
  s+='<div class="strat"><h4>Charm pricing: '+(sweet_spot-0.01)+'E</h4><p>El clasico .99. Funciona mejor en tickets bajos (< 40E). El cerebro lee "'+Math.floor(sweet_spot-1)+'" en vez de "'+sweet_spot+'".</p></div>';
  var envio_gratis=sweet_spot+Math.ceil(ship*1.2);
  s+='<div class="strat"><h4>Envio gratis absorbido: '+envio_gratis+'E</h4><p>Subes el precio '+Math.ceil(ship*1.2)+'E y ofreces envio gratis. Convierte un 20% más en la mayoria de nichos.</p></div>';
  var bundle_2=Math.ceil(sweet_spot*1.8);
  s+='<div class="strat"><h4>Bundle x2 con descuento: '+bundle_2+'E</h4><p>2 unidades por '+bundle_2+'E en vez de '+(sweet_spot*2)+'E. El cliente siente que ahorra. Tu subes ticket medio un 80%.</p></div>';
  document.getElementById('strats').innerHTML=s;

  // Bundles
  var b='';
  var comp_price=Math.ceil(cost*0.3)+cost;
  b+='<div class="bundle"><h4>Bundle: Producto + Complemento</h4><p>Anade un producto complementario de coste bajo (~'+Math.ceil(cost*0.3)+'E). Vendelo a '+(sweet_spot+Math.ceil(sweet_spot*0.4))+'E el pack.</p><div class="nums">Ticket medio: de '+sweet_spot+'E a '+(sweet_spot+Math.ceil(sweet_spot*0.4))+'E (+'+Math.ceil(40)+'%)</div></div>';
  b+='<div class="bundle"><h4>Upsell post-checkout</h4><p>"Anade [producto complementario] por solo '+Math.ceil(sweet_spot*0.3)+'E más." Se muestra despues de pagar. 15-25% de compradores aceptan.</p><div class="nums">Revenue extra: ~'+Math.ceil(sweet_spot*0.3*0.2)+'E por pedido medio</div></div>';
  b+='<div class="bundle"><h4>Suscripcion / Replenishment</h4><p>Si tu producto se consume: ofrece suscripcion con 10% de descuento. LTV sube x3-5. Solo aplica en consumibles.</p><div class="nums">LTV estimado: de '+sweet_spot+'E a '+(sweet_spot*4)+'E</div></div>';
  document.getElementById('bundles').innerHTML=b;
}
calc();
</script>
</body>
</html>
